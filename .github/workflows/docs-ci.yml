name: docs-ci

on:
  pull_request:
    paths:
      - README.md
      - TEMPLATE_SETUP.md
      - AGENTS.md
      - DESIGN.md
      - ".github/*.md"
      - ".github/**/*.md"
      - ".work-logs/templates/*.md"
      - ".github/.markdownlint.json"
      - ".github/.typos.toml"
      - ".github/workflows/docs-ci.yml"
  push:
    paths:
      - README.md
      - TEMPLATE_SETUP.md
      - AGENTS.md
      - DESIGN.md
      - ".github/*.md"
      - ".github/**/*.md"
      - ".work-logs/templates/*.md"
      - ".github/.markdownlint.json"
      - ".github/.typos.toml"
      - ".github/workflows/docs-ci.yml"

jobs:
  markdownlint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          config: .github/.markdownlint.json
          globs: |
            README.md
            TEMPLATE_SETUP.md
            AGENTS.md
            DESIGN.md
            .github/*.md
            .github/**/*.md
            .work-logs/templates/*.md

  links:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --verbose
            --no-progress
            --exclude-mail
            --timeout 20
            --max-concurrency 4
            --retry-wait-time 2
            --max-retries 2
            README.md
            TEMPLATE_SETUP.md
            AGENTS.md
            DESIGN.md
            .github/*.md
            .github/**/*.md
            .work-logs/templates/*.md

  typos:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1.32.0
        with:
          config: .github/.typos.toml
          files: |
            README.md
            TEMPLATE_SETUP.md
            AGENTS.md
            DESIGN.md
            .github/*.md
            .github/**/*.md
            .work-logs/templates/*.md
